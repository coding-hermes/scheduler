guards:
  secrets: true
  lint: false
  tests: false
  test_mode: full
  go:
    build: true
    lint: true
    tests: true
evaluator:
  max_iterations: 100
  max_time: "10m"
  max_input_tokens: "0.2M"
  max_output_tokens: "0.05M"
  tool_call_weight: 0.1
  static_analysis_diagnostics: false

pipeline:
  stages:
    - id: tier1
      parallel: true
      on: [pre-commit, pre-eval]
      steps:
        - id: guard
          type: script
          run: "gitreins guard"
          on_fail: block
    - id: tier2
      type: ai_eval
      on: [pre-eval]
      condition: "true"
      max_iterations: 50
      tools: [read_file, run_command, search_pattern, read_diff, sandbox, detect_dead_code]

defaults:
  model: deepseek-v4-flash
  max_iterations: 50
  check_for_updates: true
  update_check_ttl: "24h"
history:
  enabled: true
  storage: git
  max_verdicts: 1000
