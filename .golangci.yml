version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - prealloc
  settings:
    errcheck:
      check-blank: false
      exclude-functions:
        - (*database/sql.DB).Exec
        - (*database/sql.Rows).Close
        - (*database/sql.Row).Scan
        - (*database/sql.Rows).Scan
        - (io.Reader).Read
        - (*os.File).Close
        - (*encoding/json.Encoder).Encode
        - (net/http.ResponseWriter).Write
        - (*log.Logger).Printf
        - os.RemoveAll
        - (*database/sql.DB).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unused
      - path: internal/scheduler/sim_fixture_test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/coding-herms/scheduler

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
